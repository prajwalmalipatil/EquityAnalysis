name: Daily Equity Analysis Pipeline

on:
  push:
    branches: [ main ]
  schedule:
    # Runs at 17:07 IST (11:37 UTC) | Monday to Friday only
    - cron: '37 11 * * 1-5'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Clean Data Directory
      run: mkdir -p equity_data && rm -rf equity_data/*.csv equity_data/Results/* equity_data/Trending/* equity_data/Anomaly/* equity_data/Ticker/* equity_data/Triggers/* equity_data/EigenFilter/*

    - name: "Run Stage 1: Extraction"
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        python main_extractor.py \
          --symbols "@symbols.txt" \
          --out-dir equity_data \
          --overwrite \
          --workers 3
      continue-on-error: true

    - name: "Debug: List Data"
      run: |
        echo "Current Directory: $(pwd)"
        echo "Directory Tree (Files):"
        find . -maxdepth 4 -not -path '*/.*' -type f
        echo "---"
        ls -la equity_data/ || echo "equity_data not found"
        head -n 2 equity_data/*.csv | head -n 20 || echo "No CSVs found for head"

    - name: "Run Stage 2: VSA Processing"
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        python main_processor.py --folder equity_data

    - name: "Run Notification & Summary"
      env:
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        PYTHONPATH: "."
      run: python main_notifier.py --base-dir equity_data --to "Prajwalmalipatil@gmail.com"

    - name: Upload Results as Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: equity-analysis-results
        path: |
          equity_data/Results/
          equity_data/Ticker/
          equity_data/Trending/
          equity_data/Anomaly/
          equity_data/EigenFilter/
        retention-days: 7
